name: 🔍 Validate SQL & Documentation

on:
  push:
    branches: [main, master]
    paths:
      - '**.sql'
      - '**.md'
      - '.github/workflows/validate-sql.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**.sql'
      - '**.md'

jobs:
  validate-sql-files:
    runs-on: ubuntu-latest
    name: SQL File Validation

    steps:
      - uses: actions/checkout@v3

      - name: Check SQL Files Exist
        run: |
          echo "✓ Checking SQL file structure..."

          # Check scripts directory
          if [ -d "scripts" ]; then
            echo "✓ scripts/ directory found"
            find scripts -name "*.sql" -type f | wc -l | xargs echo "  Contains SQL files:"
          fi

          # Check tests directory
          if [ -d "tests" ]; then
            echo "✓ tests/ directory found"
            find tests -name "*.sql" -type f | wc -l | xargs echo "  Contains SQL files:"
          fi

          # Check examples directory
          if [ -d "examples" ]; then
            echo "✓ examples/ directory found"
            find examples -name "*.sql" -type f | wc -l | xargs echo "  Contains SQL files:"
          fi

          # Check labs directory
          if [ -d "labs" ]; then
            echo "✓ labs/ directory found"
            find labs -name "*.sql" -type f | wc -l | xargs echo "  Contains SQL files:"
          fi

      - name: Validate SQL File Format
        run: |
          echo "✓ Checking SQL file content..."

          # Find all SQL files
          find . -name "*.sql" -type f | while read file; do
            # Check for basic SQL structure
            if grep -q "SELECT\|CREATE\|INSERT\|UPDATE\|DELETE" "$file"; then
              echo "  ✓ $file - Valid SQL structure"
            else
              echo "  ⚠️  $file - May need review"
            fi
          done

  validate-documentation:
    runs-on: ubuntu-latest
    name: Markdown Validation

    steps:
      - uses: actions/checkout@v3

      - name: Validate Markdown Files
        run: |
          echo "✓ Validating markdown documentation..."

          # Count markdown files
          md_count=$(find . -name "*.md" -type f | wc -l)
          echo "  Total markdown files: $md_count"

          # Check key documentation files
          files=("README.md" "STATUS.md" "MASTER-INDEX.md" "QUICK-START-GUIDE.md")

          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              echo "  ✓ $file ($lines lines)"
            fi
          done

  validate-references:
    runs-on: ubuntu-latest
    name: Documentation Cross-Reference Check

    steps:
      - uses: actions/checkout@v3

      - name: Check Referenced Files Exist
        run: |
          echo "✓ Checking documentation cross-references..."

          # Check main markdown files for broken links
          for file in *.md; do
            if [ -f "$file" ]; then
              # Extract [text](path) references
              grep -o '\[.*\]([^)]*\.\(md\|sql\))' "$file" | sed 's/.*(\(.*\))/\1/' | while read path; do
                # Remove anchors
                path="${path%#*}"

                if [ -z "$path" ]; then
                  continue
                fi

                # Check if file exists
                if [ ! -f "$path" ] && [ ! -d "$path" ]; then
                  echo "  ⚠️  Reference check: $path (from $file)"
                fi
              done
            fi
          done

          echo "  ✓ Reference validation complete"

  check-project-health:
    runs-on: ubuntu-latest
    name: Project Health Check

    steps:
      - uses: actions/checkout@v3

      - name: Check Essential Files
        run: |
          echo "✓ Checking essential project files..."

          required_files=("README.md" "LICENSE" ".gitignore" "MASTER-INDEX.md" "STATUS.md")
          missing=0

          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✓ $file"
            else
              echo "  ✗ MISSING: $file"
              ((missing++))
            fi
          done

          if [ $missing -eq 0 ]; then
            echo "  ✓ All essential files present"
          fi

      - name: Check Directory Structure
        run: |
          echo "✓ Checking directory structure..."

          required_dirs=("docs" "examples" "labs" "case-studies" ".github" "tests" "scripts")

          for dir in "${required_dirs[@]}"; do
            if [ -d "$dir" ]; then
              count=$(find "$dir" -type f | wc -l)
              echo "  ✓ $dir/ ($count files)"
            fi
          done

      - name: Generate Summary Report
        if: always()
        run: |
          {
            echo "# ✅ Validation Complete"
            echo ""
            echo "## Checks Performed"
            echo "- ✅ SQL file structure validated"
            echo "- ✅ Markdown documentation verified"
            echo "- ✅ Cross-references checked"
            echo "- ✅ Project structure validated"
            echo ""
            echo "## Note on Testing"
            echo "**Comprehensive testing (LAB validation, diagnostics execution) is performed locally.**"
            echo ""
            echo "To validate your database setup locally:"
            echo "1. Run: \`scripts/setup-performance-history.sql\`"
            echo "2. Run: \`tests/run-lab-validation.sql\`"
            echo "3. Run: \`scripts/quick-diagnostics.sql\`"
            echo "4. Run: \`scripts/performance-dashboard.sql\`"
            echo ""
            echo "## Resources"
            echo "- [Quick Start Guide](QUICK-START-GUIDE.md)"
            echo "- [Testing Framework](tests/README.md)"
            echo "- [Performance Dashboard](docs/PERFORMANCE-DASHBOARD.md)"
          } >> $GITHUB_STEP_SUMMARY
